name: Build macOS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (unsigned universal)
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts to GitHub release
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" \
            dist/Wispra-*-mac.dmg \
            dist/Wispra-*-mac.zip \
            dist/Wispra-*-mac.zip.blockmap \
            dist/latest-mac.yml \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
