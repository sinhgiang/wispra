name: Build macOS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle renderer + main (electron-vite)
        run: npx electron-vite build

      - name: Package macOS (electron-builder, no auto-publish)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build artifacts
        run: ls -la dist/

      - name: Upload artifacts to GitHub release
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          shopt -s nullglob
          FILES=(dist/*.dmg dist/*.dmg.blockmap dist/*.zip dist/*.zip.blockmap dist/latest-mac.yml)
          gh release upload "$TAG" "${FILES[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
